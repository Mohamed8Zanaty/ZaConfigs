[colors]
background     = #0d1117
background-alt = #2f363d
foreground     = #d0d7de
primary        = #D29922
secondary      = #539bf5
alert          = #D29922
disabled       = #4e5b55
green          = #3fb950
red            = #f85149

[bar/example]
monitor = ${env:MONITOR:}
width   = 100%
height  = 34pt
radius  = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-bottom-size  = 2pt
border-bottom-color = ${colors.background-alt}

border-size  = 0
border-color = #00000000

padding-left  = 1
padding-right = 1

module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=13;3"

modules-left   = filesystem sep pulseaudio sep memory sep cpu sep network
modules-center = xworkspaces
modules-right  = lock keyboard sep battery sep date sep hour sep screenshot powermenu sep tray

fixed-center   = true
cursor-click   = pointer
cursor-scroll  = ns-resize
enable-ipc     = true
wm-restack     = bspwm

[module/sep]
type             = custom/text
content          = |
content-foreground = ${colors.disabled}

[module/xworkspaces]
type = internal/xworkspaces

label-active            = %name%
label-active-background = ${colors.background-alt}
label-active-underline  = ${colors.primary}
label-active-padding    = 2

label-occupied         = %name%
label-occupied-padding = 2

label-urgent            = %name%
label-urgent-background = ${colors.red}
label-urgent-padding    = 2

label-empty            = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding    = 2

[module/xwindow]
type             = internal/xwindow
label            = %title:0:60:...%
label-foreground = ${colors.foreground}

[module/filesystem]
type     = internal/fs
interval = 25
mount-0  = /
label-mounted            = 󰋊 %percentage_used%%
label-unmounted          = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume         = <label-volume>
label-volume          = 󰕾 %percentage%%
label-muted           = 󰖁 muted
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol

[module/memory]
type        = internal/memory
interval    = 3
label       = 󰍛 %percentage_used%%
label-warn  = 󰍛 %percentage_used%%
label-warn-foreground = ${colors.red}
warn-percentage = 85

[module/cpu]
type     = internal/cpu
interval = 2
label    =  %percentage:2%%
label-warn            =  %percentage:2%%
label-warn-foreground = ${colors.red}
warn-percentage = 85

[module/network]
type     = internal/network
interval = 3
interface-type = wireless

format-connected    = <label-connected>
format-disconnected = <label-disconnected>

label-connected            = 󰖩 %essid%
label-connected-foreground = ${colors.green}
label-disconnected            = 󰖪 offline
label-disconnected-foreground = ${colors.disabled}

[module/lock]
type         = internal/xkeyboard
format-margin = 0
blacklist-0  = num lock
blacklist-1  = scroll lock
format       = <label-indicator>
label-indicator-padding = 1
indicator-icon-0        = caps lock;-CL;+CL
label-indicator-off     =
label-indicator-on      = " 󰪛 CAPS "
format-foreground       = ${colors.background}
format-background       = ${colors.alert}

[module/date]
type     = custom/script
interval = 60
format   = <label>
exec     = date +"%a %b %-d"
click-left = gsimplecal
label-foreground = ${colors.foreground}

[module/hour]
type     = internal/date
interval = 1
date     = %l:%M %p
date-alt = %Y-%m-%d %l:%M:%S %p
label    = %date%
label-foreground = ${colors.primary}

[module/screenshot]
type             = custom/text
content          = 󰻛
content-foreground = ${colors.secondary}
click-left       = flameshot gui

[module/powermenu]
type             = custom/text
content          = 󰐥
content-foreground = ${colors.red}
click-left       = ~/.config/bspwm/scripts/power

[module/tray]
type         = internal/tray
tray-spacing = 6px

[module/keyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock

format = <label-layout>
label-layout = 󰌌 %layout%
label-layout-foreground = ${colors.foreground}

[module/battery]
type = internal/battery

; Replace with your actual battery name from step 1
battery = BAT0
adapter = AC
full-at = 98

; Poll every 5 seconds
poll-interval = 5

; Icons (requires a Nerd Font)
format-charging    = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full        = <label-full>
format-full-prefix = " "

label-charging    = %percentage%%
label-discharging = %percentage%%
label-full        = Full
ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁺
ramp-capacity-2 = 󰁼
ramp-capacity-3 = 󰁿
ramp-capacity-4 = 󰂂

animation-charging-0 = 󰁺
animation-charging-1 = 󰁼
animation-charging-2 = 󰁿
animation-charging-3 = 󰂂
animation-charging-4 = 󰂄
animation-charging-framerate = 750

; Colors
format-charging-foreground    = #ffb52a
format-discharging-foreground = #ffffff
format-full-foreground        = #88c0d0
[settings]
screenchange-reload = true
pseudo-transparency = true
